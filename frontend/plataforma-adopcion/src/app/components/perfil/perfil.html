<div class="perfil-container">
    <div class="perfil-card">

        <div class="perfil-header">
            <div class="avatar-container">
                <img [src]="usuarioActual?.imagen_url || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'"
                    alt="Avatar" class="img-perfil">
                <span class="badge-rol">{{ usuarioActual?.rol === 'protectora' ? '🏢 Protectora' : '👤 Adoptante'
                    }}</span>
            </div>
            <h2>Mi Perfil de Usuario</h2>
            <p>Gestiona tu información personal y los accesos de tu cuenta</p>
        </div>

        @if (errorMensaje) {
        <div class="alert alert-error">{{ errorMensaje }}</div>
        }
        @if (exitoMensaje) {
        <div class="alert alert-exito">{{ exitoMensaje }}</div>
        }

        <form (ngSubmit)="onGuardarCambios()" *ngIf="usuarioActual">

            <div class="form-row">
                <div class="form-group">
                    <label>Tipo de Cuenta</label>
                    <input type="text" [value]="usuarioActual.rol | uppercase" disabled class="input-disabled">
                </div>
            </div>

            <div class="form-group">
                <label for="nombre">Nombre / Razón Social</label>
                <input type="text" id="nombre" name="nombre" [(ngModel)]="usuarioActual.nombre" [disabled]="!editando"
                    [class.input-disabled]="!editando" required>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" [(ngModel)]="usuarioActual.email" [disabled]="!editando"
                    [class.input-disabled]="!editando" required>
            </div>

            <div class="form-group">
                <label for="imagen_url">Enlace / URL de tu Foto de Perfil</label>
                <input type="url" id="imagen_url" name="imagen_url" [(ngModel)]="usuarioActual.imagen_url"
                    [disabled]="!editando" [class.input-disabled]="!editando"
                    placeholder="Pega la URL de una foto en internet">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" [(ngModel)]="usuarioActual.password"
                    placeholder="{{ editando ? 'Escribe la nueva contraseña' : '••••••••' }}" [disabled]="!editando"
                    [class.input-disabled]="!editando">
            </div>

            <div class="botones-secuencia">
                @if (!editando) {
                <div class="bloque-lectura">
                    <button type="button" class="btn-editar" (click)="onActivarEdicion()">✏️ Editar Perfil</button>
                    <button type="button" class="btn-eliminar" (click)="onEliminarCuenta()">🗑️ Eliminar cuenta</button>
                </div>
                } @else {
                <div class="bloque-edicion">
                    <button type="button" class="btn-cancelar" (click)="onCancelar()">❌ Cancelar</button>
                    <button type="submit" class="btn-guardar">💾 Guardar Cambios</button>
                </div>
                }
            </div>

        </form>
    </div>
</div>
