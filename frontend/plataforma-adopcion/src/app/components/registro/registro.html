<div class="registro-container">
  <div class="registro-card">
    <div class="registro-header">
      <h2>📝 Crear Cuenta</h2>
      <p>Únete a la comunidad de Huellas Felices</p>
    </div>

    <form (ngSubmit)="onRegistro()">
      
      @if (errorMensaje) {
        <div class="alert alert-error">{{ errorMensaje }}</div>
      }
      @if (exitoMensaje) {
        <div class="alert alert-exito">{{ exitoMensaje }}</div>
      }

      <div class="form-group">
        <label for="nombre">Nombre Completo / Entidad</label>
        <input 
          type="text" 
          id="nombre" 
          name="nombre" 
          [(ngModel)]="nuevoUsuario.nombre" 
          placeholder="Ej. Juan Pérez o Protectora Amigos"
          required
        >
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="nuevoUsuario.email" 
          placeholder="correo@ejemplo.com"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="nuevoUsuario.password" 
          placeholder="Mínimo 6 caracteres"
          required
        >
      </div>

      <div class="form-group">
        <label for="rol">¿Quién eres?</label>
        <select id="rol" name="rol" [(ngModel)]="nuevoUsuario.rol">
          <option value="adoptante">👤 Particular (Quiero adoptar o dar en adopción)</option>
          <option value="protectora">🏢 Entidad Protectora / Refugio</option>
        </select>
      </div>

      <button type="submit" class="btn-registro">Registrarse</button>
    </form>

    <div class="registro-footer">
      <p>¿Ya tienes una cuenta? <a href="/login">Inicia sesión aquí</a></p>
    </div>
  </div>
</div>
