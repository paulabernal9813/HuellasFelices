<nav class="navbar">
  <div class="nav-container">
    <a routerLink="/" class="logo">
      <img src="logo-protectora.png" alt="Logo" class="logo-img">
      <span>Huellas Felices</span>
    </a>

    <ul class="nav-links">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Adopciones</a></li>
      <li><a routerLink="/protectoras">Protectoras</a></li>
      
      @if (!isLoggedIn()) {
        <li><a routerLink="/login" class="btn-login">Iniciar Sesión</a></li>
        <li><a routerLink="/registro" class="btn-registro">Registrarse</a></li>
      } 
      @else {
        <li><a routerLink="/perfil" class="btn-perfil">Mi Perfil ({{ usuarioLogueado?.nombre }})</a></li>
        <li><button (click)="logout()" class="btn-logout">Cerrar Sesión</button></li>
      }
    </ul>
  </div>
</nav>
